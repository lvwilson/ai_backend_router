# config.yaml — Live test configuration (Quadro RTX 8000, 48 GB).
# llama backend mirrors ~/models/models.ini [Qwen3.6-27b]; ComfyUI is the
# real install at ~/stable_diffusion/ComfyUI serving the Krea2 workflow.

router:
  host: "127.0.0.1"
  port: 8000
  total_vram: 48

backends:
  qwen3.6-27b:
    type: llama
    binary: llama-server
    model: ~/models/llm/Huihui-Qwen3.6-27B-abliterated-mtp-Q8_0.gguf
    port: 8080
    context_size: 200000
    gpu_layers: 99
    vram_usage: 38        # Estimated; measured on launch thereafter
    retries: 1
    health_timeout: 300   # 28 GB of weights takes a while to load
    extra_args:
      - "--mmproj"
      - "~/models/llm/Qwen3.6-27B-mmproj-F16.gguf"
      - "--batch-size"
      - "4096"
      - "--ubatch-size"
      - "1024"
      - "--temp"
      - "0.6"
      - "--top-p"
      - "0.95"
      - "--min-p"
      - "0.01"
      - "--top-k"
      - "20"
      - "--spec-type"
      - "draft-mtp"
      - "--spec-draft-n-max"
      - "2"
      - "--cache-ram"
      - "20000"
      - "--image-min-tokens"
      - "1024"

  qwen3.6-27b-instruct:
    type: llama
    binary: llama-server
    model: ~/models/llm/Huihui-Qwen3.6-27B-abliterated-mtp-Q8_0.gguf
    port: 8081
    context_size: 200000
    gpu_layers: 99
    vram_usage: 38
    retries: 1
    health_timeout: 300
    extra_args:
      - "--mmproj"
      - "~/models/llm/Qwen3.6-27B-mmproj-F16.gguf"
      - "--batch-size"
      - "4096"
      - "--ubatch-size"
      - "1024"
      - "--temp"
      - "0.6"
      - "--top-p"
      - "0.95"
      - "--min-p"
      - "0.01"
      - "--top-k"
      - "20"
      - "--reasoning-budget"
      - "0"
      - "--reasoning"
      - "off"
      - "--spec-type"
      - "draft-mtp"
      - "--spec-draft-n-max"
      - "2"
      - "--cache-ram"
      - "20000"
      - "--image-min-tokens"
      - "1024"

  qwen3-asr-1.7b:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-1.7b
    model: ~/.cache/crispasr/qwen3-asr-1.7b-q4_k.gguf
    port: 9000
    vram_usage: 2.5
    health_timeout: 30

  qwen3-asr-1.7b-cpu:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-1.7b
    model: ~/.cache/crispasr/qwen3-asr-1.7b-q4_k.gguf
    port: 9001
    cpu: true
    ram_usage: 3.0
    health_timeout: 30

  qwen-talker-1.7b-customvoice:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-tts-1.7b-customvoice
    model: ~/models/tts/qwen-talker-1.7b-customvoice-Q8_0.gguf
    codec_model: ~/models/tts/qwen3-tts-tokenizer-12hz-q8_0.gguf
    port: 9002
    vram_usage: 2.5
    health_timeout: 30

  qwen-talker-1.7b-customvoice-cpu:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-tts-1.7b-customvoice
    model: ~/models/tts/qwen-talker-1.7b-customvoice-Q8_0.gguf
    codec_model: ~/models/tts/qwen3-tts-tokenizer-12hz-q8_0.gguf
    port: 9003
    cpu: true
    ram_usage: 3.0
    health_timeout: 30

  qwen-talker-1.7b-voicedesign:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-tts-1.7b-voicedesign
    model: ~/models/tts/qwen-talker-1.7b-voicedesign-Q8_0.gguf
    codec_model: ~/models/tts/qwen3-tts-tokenizer-12hz-q8_0.gguf
    port: 9004
    vram_usage: 2.5
    health_timeout: 60
    retries: 2

  qwen-talker-1.7b-voicedesign-cpu:
    type: crispasr
    binary: ~/CrispASR/build/bin/crispasr
    backend: qwen3-tts-1.7b-voicedesign
    model: ~/models/tts/qwen-talker-1.7b-voicedesign-Q8_0.gguf
    codec_model: ~/models/tts/qwen3-tts-tokenizer-12hz-q8_0.gguf
    port: 9005
    cpu: true
    ram_usage: 3.0
    health_timeout: 30

  image:
    type: comfyui
    venv: ~/stable_diffusion/ComfyUI/venv/bin/python
    working_dir: ~/stable_diffusion/ComfyUI
    main: main.py
    port: 8188
    vram_usage: 3         # Torch CUDA context + ComfyUI overhead
    output_dir: ~/stable_diffusion/ComfyUI/output
    retries: 1
    health_timeout: 180
    models:
      krea2:
        workflow: ~/projectnotes/untracked/Krea2 Basic.json
        vram_usage: 17    # unet 13G + vae 0.5G + clip (partially offloaded)
